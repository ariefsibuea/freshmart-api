services:
  api:
    image: freshmart-api:latest
    container_name: freshmart-api
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freshmart-api-network

  mysql:
    image: mysql:8.4
    container_name: freshmart-api-mysql
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - freshmart-api-network

  redis:
    image: redis:8-alpine
    container_name: freshmart-api-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - freshmart-api-network

networks:
  freshmart-api-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
